name: holdmate
description: Hold Mate - Production Ready Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  geocoding: ^2.0.5
  go_router: ^13.0.1
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  image_picker: ^1.0.5
  animations: ^2.0.7
  lottie: ^2.7.0
  flutter_staggered_animations: ^1.1.0
  http: ^1.1.0
  mailer: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
    - assets/animations/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.jpeg"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.jpeg"
    background_color: "#0A0A0F"
    theme_color: "#0A0A0F"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.jpeg"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/app_icon.jpeg"
  email_otp: ^2.0.0
